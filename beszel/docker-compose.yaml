services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      APP_URL: https://bz.itgo.com.au
    volumes:
      - /opt/backed-up-volumes/beszel/beszel_data:/beszel_data
      - /opt/not-backed-up-volumes/beszel/beszel_socket:/beszel_socket
    networks:
      - beszel_net
    healthcheck:
      test: ["CMD", "/beszel", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "managed-by=pipeline"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    network_mode: host
    volumes:
      - /opt/backed-up-volumes/beszel/beszel_agent_data:/var/lib/beszel-agent
      - /opt/not-backed-up-volumes/beszel/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: https://bz.itgo.com.au
      TOKEN: ${BESZEL_ENVIRONMENT_TOKEN}
      KEY: ${BESZEL_ENVIRONMENT_KEY}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "managed-by=pipeline"

networks:
  beszel_net:
    external: true
    name: beszel_net
