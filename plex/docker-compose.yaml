services:
  plex:
    image: plexinc/pms-docker
    container_name: plex
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - plex_net
    environment:
      - TZ=Australia/Melbourne  # Change to your time zone
      - PLEX_CLAIM=claim-${PLEX_CLAIM}           # Optional: for linking to your Plex account
    volumes:
      - /home/nathangemmill/plex/config:/config
      - /home/nathangemmill/plex/media:/media
    devices:
      - /dev/dri:/dev/dri       # (Optional) For hardware transcoding
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "managed-by=pipeline"
networks:
  plex_net:
    external: true
    name: plex_net
