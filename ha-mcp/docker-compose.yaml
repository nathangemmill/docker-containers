services:
  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    container_name: ha-mcp
    restart: always
    ports:
      - "8086:8086"
      - "9583:8086"
    environment:
      HOMEASSISTANT_URL: ${HOMEASSISTANT_URL}
      HOMEASSISTANT_TOKEN: ${HOMEASSISTANT_TOKEN}
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: fastmcp run fastmcp-http.json
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket;s=socket.socket();s.settimeout(5);s.connect(('127.0.0.1',8086));s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "managed-by=pipeline"
