services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      # optionally set args if you want to change plugin list dynamically
    container_name: caddy
    restart: unless-stopped
    user: "1000:1000"
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - caddynet
    environment:
      # put your Cloudflare token in a .env file (see .env.example below)
      - CF_API_TOKEN=${CADDY_CF_API_TOKEN}
      # other useful envs
      - TZ=Australia/Melbourne
    volumes:
      - /opt/backed-up-volumes/caddy/conf:/etc/caddy        # Caddyfile + any configs
      - /opt/backed-up-volumes/caddy/site:/srv             # web root
      - /opt/backed-up-volumes/caddy/caddy_data:/data
      - /opt/backed-up-volumes/caddy/caddy_config:/config
    depends_on:
      authelia:
        condition: service_healthy
    ports:
      - 80:80
      - 443:443
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "com.centurylinklabs.watchtower.monitor-only=true"
      - "managed-by=pipeline"

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - caddynet
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - /opt/backed-up-volumes/caddy/authelia:/config
    expose:
      - 9091
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "managed-by=pipeline"

volumes:
  caddy_data:
  caddy_config:

networks:
  caddynet:
    external: true
    driver: bridge
    name: caddynet
