services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      # optionally set args if you want to change plugin list dynamically
    container_name: caddy
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - caddy_net
      - cloudflared_net
      - dockhand_net
      - audiobookshelf_net
      - beszel_net
      - campbell_net
      - itgo_net
      - invio_net
      - it_tools_net
      - mealie_net
      - papra_net
      - qbittorrent_net
      - switchprices_net
      - uptime_kuma_net
      - vaultwarden_net
    environment:
      # put your Cloudflare token in a .env file (see .env.example below)
      - CF_API_TOKEN=${CADDY_CF_API_TOKEN}
      # other useful envs
      - TZ=Australia/Melbourne
    volumes:
      - /opt/backed-up-volumes/caddy/conf:/etc/caddy        # Caddyfile + any configs
      - /opt/backed-up-volumes/caddy/site:/srv             # web root
      - /opt/backed-up-volumes/caddy/caddy_data:/data
      - /opt/backed-up-volumes/caddy/caddy_config:/config
    depends_on:
      authelia:
        condition: service_healthy
    ports:
      - 80:80
      - 443:443
    healthcheck:
      test: ["CMD-SHELL", "wget -qSO /dev/null http://localhost:80/ 2>&1 | grep -qE '^  HTTP/'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "com.centurylinklabs.watchtower.monitor-only=true"
      - "managed-by=pipeline"

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    networks:
      - caddy_net
    environment:
      - TZ=Australia/Melbourne
      - AUTHELIA_NOTIFIER_SMTP_ADDRESS=smtp://${SMTP_HOST}:${SMTP_PORT}
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${SMTP_USER}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${SMTP_PASSWORD}
      - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA_NOTIFIER_SMTP_SENDER}
      - AUTHELIA_DUO_API_HOSTNAME=${AUTHELIA_DUO_API_HOSTNAME}
      - AUTHELIA_DUO_API_INTEGRATION_KEY=${AUTHELIA_DUO_API_INTEGRATION_KEY}
      - AUTHELIA_DUO_API_SECRET_KEY=${AUTHELIA_DUO_API_SECRET_KEY}
    volumes:
      - /opt/backed-up-volumes/caddy/authelia:/config
    expose:
      - 9091
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "managed-by=pipeline"

volumes:
  caddy_data:
  caddy_config:

networks:
  caddy_net:
    external: true
    driver: bridge
    name: caddy_net
  cloudflared_net:
    external: true
    name: cloudflared_net
  dockhand_net:
    external: true
    name: dockhand_net
  audiobookshelf_net:
    external: true
    name: audiobookshelf_net
  beszel_net:
    external: true
    name: beszel_net
  campbell_net:
    external: true
    name: campbell_net
  itgo_net:
    external: true
    name: itgo_net
  invio_net:
    external: true
    name: invio_net
  it_tools_net:
    external: true
    name: it_tools_net
  mealie_net:
    external: true
    name: mealie_net
  papra_net:
    external: true
    name: papra_net
  qbittorrent_net:
    external: true
    name: qbittorrent_net
  switchprices_net:
    external: true
    name: switchprices_net
  uptime_kuma_net:
    external: true
    name: uptime_kuma_net
  vaultwarden_net:
    external: true
    name: vaultwarden_net
