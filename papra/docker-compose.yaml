services:
  papra:
    image: ghcr.io/papra-hq/papra:latest
    container_name: papra
    restart: unless-stopped
    environment:
      - APP_BASE_URL=https://papra.internal.itgo.com.au
      - AUTH_SECRET=${PAPRA_AUTH_SECRET}
      - AUTH_IS_REGISTRATION_ENABLED=false
      - EMAILS_FROM_ADDRESS=${PAPRA_EMAILS_FROM_ADDRESS}
      - EMAILS_DRIVER=smtp
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=true
    volumes:
      - /opt/backed-up-volumes/papra/data:/app/app-data
    networks:
      - caddynet
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "managed-by=pipeline"

networks:
  caddynet:
    external: true
    name: caddynet
