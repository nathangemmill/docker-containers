services:
  papra:
    build:
      context: https://github.com/nathangemmill/papra.git#nathangemmill/add-notes-field
      dockerfile: apps/papra-server/Dockerfile
    container_name: papra
    restart: unless-stopped
    environment:
      - APP_BASE_URL=https://papra.internal.itgo.com.au
      - AUTH_SECRET=${PAPRA_AUTH_SECRET}
      - AUTH_IS_REGISTRATION_ENABLED=false
      - EMAILS_FROM_ADDRESS=${PAPRA_EMAILS_FROM_ADDRESS}
      - EMAILS_DRIVER=smtp
      - SMTP_HOST=${PAPRA_SMTP_HOST}
      - SMTP_USER=${PAPRA_SMTP_USER}
      - SMTP_PASSWORD=${PAPRA_SMTP_PASSWORD}
      - SMTP_PORT=${PAPRA_SMTP_PORT}
      - SMTP_SECURE=true
    volumes:
      - /opt/backed-up-volumes/papra/data:/app/app-data
    networks:
      - caddynet
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  caddynet:
    external: true
    name: caddynet
