services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    user: "1000:1000"
    networks:
      - caddynet
    volumes:
      - /opt/not-backed-up-volumes/audiobookshelf/audiobooks:/audiobooks
      - /opt/not-backed-up-volumes/audiobookshelf/podcasts:/podcasts
      - /opt/backed-up-volumes/audiobookshelf/config:/config
      - /opt/backed-up-volumes/audiobookshelf/metadata:/metadata
    environment:
      - TZ=Australia/Melbourne
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "managed-by=pipeline"
    restart: unless-stopped
networks:
  caddynet:
    external: true
    name: caddynet
