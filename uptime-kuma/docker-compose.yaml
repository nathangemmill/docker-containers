services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - caddynet
    volumes:
      - /opt/backed-up-volumes/uptime-kuma/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://127.0.0.1:3001/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "managed-by=pipeline"
networks:
  caddynet:
    external: true
    name: caddynet
