name: Deploy Docker Containers (dockerbox)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, dockerbox]

    env:
      #beszel
      BESZEL_ENVIRONMENT_TOKEN: ${{secrets.BESZEL_ENVIRONMENT_TOKEN}}
      BESZEL_ENVIRONMENT_KEY: ${{secrets.BESZEL_ENVIRONMENT_KEY}}
      #caddy
      CADDY_CF_API_TOKEN: ${{secrets.CADDY_CF_API_TOKEN}}
      #cloudflare tunnel
      CLOUDFLARED_TUNNEL_TOKEN: ${{secrets.CLOUDFLARED_TUNNEL_TOKEN}}
      #docker-volume-backup
      DOCKER_VOLUME_BACKUP_NOTIFICATION_URLS: ${{secrets.DOCKER_VOLUME_BACKUP_NOTIFICATION_URLS}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONTAINER_NAME: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONTAINER_NAME}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONNECTION_STRING: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONNECTION_STRING}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_ACCOUNT_NAME: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_ACCOUNT_NAME}}
      #invio              
      INVIO_ADMIN_USER: ${{secrets.INVIO_ADMIN_USER}}
      INVIO_ADMIN_PASS: ${{secrets.INVIO_ADMIN_PASS}}
      INVIO_JWT_SECRET: ${{secrets.INVIO_JWT_SECRET}}
      #mealie
      MEALIE_POSTGRES_PASSWORD: ${{secrets.MEALIE_POSTGRES_PASSWORD}}
      #papra
      PAPRA_AUTH_SECRET: ${{secrets.PAPRA_AUTH_SECRET}}
      PAPRA_EMAILS_FROM_ADDRESS: ${{secrets.PAPRA_EMAILS_FROM_ADDRESS}}
      #plex
      PLEX_CLAIM: ${{secrets.PLEX_CLAIM}}
      #vaultwarden
      VAULTWARDEN_ADMIN_TOKEN: ${{secrets.VAULTWARDEN_ADMIN_TOKEN}}
      #smtp (shared)
      SMTP_HOST: ${{secrets.SMTP_HOST}}
      SMTP_PORT: ${{secrets.SMTP_PORT}}
      SMTP_USER: ${{secrets.SMTP_USER}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}
      #watchtower
      WATCHTOWER_NOTIFICATION_URL: ${{secrets.WATCHTOWER_NOTIFICATION_URL}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy all containers
        run: |
          for dir in */; do
            if [ -f "${dir}docker-compose.yaml" ]; then
              echo ">>> Deploying ${dir}"
              docker compose -f "${dir}docker-compose.yaml" up -d --remove-orphans
            fi
          done

      - name: Remove unmanaged containers
        run: |
          docker ps -q | while read id; do
            label=$(docker inspect --format '{{index .Config.Labels "managed-by"}}' "$id")
            if [ "$label" != "pipeline" ]; then
              name=$(docker inspect --format '{{.Name}}' "$id")
              echo "Removing unmanaged container: $name"
              docker rm -f "$id"
            fi
          done