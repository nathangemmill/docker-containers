name: Deploy Docker Containers (dockerbox)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      redeploy_campbells:
        description: 'Force redeploy campbellsfamilycare'
        type: boolean
        default: false
      redeploy_itgo:
        description: 'Force redeploy itgo-website'
        type: boolean
        default: false
      redeploy_switchprices:
        description: 'Force redeploy switchprices'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, dockerbox]

    env:
      #beszel
      BESZEL_ENVIRONMENT_TOKEN: ${{secrets.BESZEL_ENVIRONMENT_TOKEN}}
      BESZEL_ENVIRONMENT_KEY: ${{secrets.BESZEL_ENVIRONMENT_KEY}}
      #caddy
      CADDY_CF_API_TOKEN: ${{secrets.CADDY_CF_API_TOKEN}}
      AUTHELIA_NOTIFIER_SMTP_SENDER: ${{secrets.AUTHELIA_NOTIFIER_SMTP_SENDER}}
      AUTHELIA_DUO_API_HOSTNAME: ${{secrets.AUTHELIA_DUO_API_HOSTNAME}}
      AUTHELIA_DUO_API_INTEGRATION_KEY: ${{secrets.AUTHELIA_DUO_API_INTEGRATION_KEY}}
      AUTHELIA_DUO_API_SECRET_KEY: ${{secrets.AUTHELIA_DUO_API_SECRET_KEY}}
      #cloudflare tunnel
      CLOUDFLARED_TUNNEL_TOKEN: ${{secrets.CLOUDFLARED_TUNNEL_TOKEN}}
      #docker-volume-backup
      DOCKER_VOLUME_BACKUP_NOTIFICATION_URLS: ${{secrets.DOCKER_VOLUME_BACKUP_NOTIFICATION_URLS}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONTAINER_NAME: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONTAINER_NAME}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONNECTION_STRING: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_CONNECTION_STRING}}
      DOCKER_VOLUME_BACKUP_AZURE_STORAGE_ACCOUNT_NAME: ${{secrets.DOCKER_VOLUME_BACKUP_AZURE_STORAGE_ACCOUNT_NAME}}
      #invio              
      INVIO_ADMIN_USER: ${{secrets.INVIO_ADMIN_USER}}
      INVIO_ADMIN_PASS: ${{secrets.INVIO_ADMIN_PASS}}
      INVIO_JWT_SECRET: ${{secrets.INVIO_JWT_SECRET}}
      #ha-mcp
      HOMEASSISTANT_URL: ${{secrets.HOMEASSISTANT_URL}}
      HOMEASSISTANT_TOKEN: ${{secrets.HOMEASSISTANT_TOKEN}}
      #mealie
      MEALIE_POSTGRES_PASSWORD: ${{secrets.MEALIE_POSTGRES_PASSWORD}}
      #papra
      PAPRA_AUTH_SECRET: ${{secrets.PAPRA_AUTH_SECRET}}
      PAPRA_EMAILS_FROM_ADDRESS: ${{secrets.PAPRA_EMAILS_FROM_ADDRESS}}
      #vaultwarden
      VAULTWARDEN_ADMIN_TOKEN: ${{secrets.VAULTWARDEN_ADMIN_TOKEN}}
      #smtp (shared)
      SMTP_HOST: ${{secrets.SMTP_HOST}}
      SMTP_PORT: ${{secrets.SMTP_PORT}}
      SMTP_USER: ${{secrets.SMTP_USER}}
      SMTP_PASSWORD: ${{secrets.SMTP_PASSWORD}}
      #campbellsfamilycare
      CAMPBELLS_GH_TOKEN: ${{secrets.CAMPBELLS_GH_TOKEN}}
      CAMPBELLS_TURNSTILE_SECRET_KEY: ${{secrets.CAMPBELLS_TURNSTILE_SECRET_KEY}}
      CAMPBELLS_ADMIN_EMAIL: ${{secrets.CAMPBELLS_ADMIN_EMAIL}}
      CAMPBELLS_ADMIN_PASSWORD: ${{secrets.CAMPBELLS_ADMIN_PASSWORD}}
      CAMPBELLS_SMTP2GO_HOST: ${{secrets.CAMPBELLS_SMTP2GO_HOST}}
      CAMPBELLS_SMTP2GO_USER: ${{secrets.CAMPBELLS_SMTP2GO_USER}}
      CAMPBELLS_SMTP2GO_PASSWORD: ${{secrets.CAMPBELLS_SMTP2GO_PASSWORD}}
      CAMPBELLS_EMAILS_FROM_ADDRESS: ${{secrets.CAMPBELLS_EMAILS_FROM_ADDRESS}}
      #itgo-website
      ITGO_GH_TOKEN: ${{secrets.ITGO_GH_TOKEN}}
      ITGO_TURNSTILE_SITE_KEY: ${{secrets.ITGO_TURNSTILE_SITE_KEY}}
      ITGO_TURNSTILE_SECRET_KEY: ${{secrets.ITGO_TURNSTILE_SECRET_KEY}}
      ITGO_ADMIN_EMAIL: ${{secrets.ITGO_ADMIN_EMAIL}}
      ITGO_ADMIN_PASSWORD: ${{secrets.ITGO_ADMIN_PASSWORD}}
      ITGO_EMAILS_FROM_ADDRESS: ${{secrets.ITGO_EMAILS_FROM_ADDRESS}}
      #switchprices
      SWITCHPRICES_GH_TOKEN: ${{secrets.SWITCHPRICES_GH_TOKEN}}
      SWITCHPRICES_POSTGRES_PASSWORD: ${{secrets.SWITCHPRICES_POSTGRES_PASSWORD}}
      SWITCHPRICES_SECRET_KEY: ${{secrets.SWITCHPRICES_SECRET_KEY}}
      SWITCHPRICES_DEEPSEEK_API: ${{secrets.SWITCHPRICES_DEEPSEEK_API}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create service networks
        run: |
          for net in caddy_net cloudflared_net audiobookshelf_net beszel_net campbell_net dockhand_net itgo_net invio_net it_tools_net mealie_net mealie_internal papra_net qbittorrent_net uptime_kuma_net vaultwarden_net switchprices_net switchprices_internal; do
            docker network create --driver bridge $net || true
          done

      - name: Deploy all containers
        run: |
          for dir in */; do
            if [ -f "${dir}docker-compose.yaml" ]; then
              echo ">>> Deploying ${dir}"
              if [ "$dir" = "campbellsfamilycare/" ]; then
                if docker ps --format '{{.Names}}' | grep -q '^campbellsfamilycare$' && [ "${{ inputs.redeploy_campbells }}" != "true" ]; then
                  echo ">>> Skipping campbellsfamilycare (already running)"
                  continue
                fi
                docker compose -f "${dir}docker-compose.yaml" build --no-cache
              fi
              if [ "$dir" = "itgo-website/" ]; then
                if docker ps --format '{{.Names}}' | grep -q '^itgo-website$' && [ "${{ inputs.redeploy_itgo }}" != "true" ]; then
                  echo ">>> Skipping itgo-website (already running)"
                  continue
                fi
                docker compose -f "${dir}docker-compose.yaml" build --no-cache
              fi
              if [ "$dir" = "switchprices/" ]; then
                if docker ps --format '{{.Names}}' | grep -q '^switchprices-backend$' && [ "${{ inputs.redeploy_switchprices }}" != "true" ]; then
                  echo ">>> Skipping switchprices (already running)"
                  continue
                fi
                docker compose -f "${dir}docker-compose.yaml" build --no-cache
              fi
              docker compose -f "${dir}docker-compose.yaml" up -d --remove-orphans --build
            fi
          done


      - name: Remove unmanaged containers
        run: |
          docker ps -q | while read id; do
            label=$(docker inspect --format '{{index .Config.Labels "managed-by"}}' "$id")
            if [ "$label" != "pipeline" ]; then
              name=$(docker inspect --format '{{.Name}}' "$id")
              echo "Removing unmanaged container: $name"
              docker rm -f "$id"
            fi
          done