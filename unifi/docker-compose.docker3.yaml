services:
  unifi:
    image: jacobalberty/unifi:latest
    container_name: unifi-controller
    init: true
    restart: unless-stopped
    user: unifi
    environment:
      TZ: Australia/Melbourne
      SYSTEM_IP: 45.76.122.187
      MEM_LIMIT: 1024
      MEM_STARTUP: 1024
    volumes:
      - /opt/backed-up-volumes/unifi:/unifi
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "managed-by=pipeline"
    ports:
      # Core
      - "8443:8443/tcp"   # Web UI (HTTPS)
      - "8080:8080/tcp"   # Device communication / inform
      - "3478:3478/udp"   # STUN
      - "10001:10001/udp" # AP discovery
      # Optional
      - "1900:1900/udp"   # L2 discovery
      - "6789:6789/tcp"   # Mobile throughput test
      - "8843:8843/tcp"   # Guest portal HTTPS
      - "8880:8880/tcp"   # Guest portal HTTP
      - "5514:5514/udp"   # Remote syslog
