services:
  itgo-website:
    build:
      context: "https://x-access-token:${ITGO_GH_TOKEN}@github.com/nathangemmill/itgo-website.git#main"
      args:
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${ITGO_TURNSTILE_SITE_KEY}
    container_name: itgo-website
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - itgo_net
    volumes:
      - /opt/backed-up-volumes/itgo/data:/app/data
    environment:
      - PORT=3000
      - TURNSTILE_SECRET_KEY=${ITGO_TURNSTILE_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=false
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASSWORD}
      - SMTP_FROM=${ITGO_EMAILS_FROM_ADDRESS}
      - ADMIN_EMAIL=${ITGO_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ITGO_ADMIN_PASSWORD}
    expose:
      - 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "managed-by=pipeline"

networks:
  itgo_net:
    external: true
    name: itgo_net
